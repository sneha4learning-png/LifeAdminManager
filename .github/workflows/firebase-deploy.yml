name: Firebase Deploy CI/CD

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Client)
        run: |
          cd client
          npm install

      - name: Build (Client)
        run: |
          cd client
          npm run build

      - name: Install dependencies (Server)
        run: |
          cd server
          npm install

      - name: Deploy to Firebase
        run: |
          npm install -g firebase-tools
          export FIREBASE_TOKEN=${{ secrets.FIREBASE_TOKEN }}
          firebase deploy --only hosting,functions --project ${{ secrets.FIREBASE_PROJECT_ID }} --json || echo "Deployment failed"
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}

